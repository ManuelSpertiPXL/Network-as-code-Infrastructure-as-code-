name: NETCONF Deploy local runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3


    - name: Install dependencies
      run: pip install -r netconf-vbox-requirements.txt

    - name: Run NETCONF script (new-hulk.py)
      run: python scripts/new-hulk.py
      env:
        ROUTER_IP: ${{ VROUTER_IP }}
        ROUTER_USER: ${{ VROUTER_USER }}
        ROUTER_PASS: ${{ VROUTER_PASS }}