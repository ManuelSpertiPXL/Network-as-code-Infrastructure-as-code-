name: Netmiko Automation

on:
  push:
    branches:
      - main

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run script
      run: python scripts/final_script.py
      env:
        AZ_ROUTER_IP: ${{ secrets.AZ_ROUTER_IP }}
        AZ_ROUTER_USER: ${{ secrets.AZ_ROUTER_USER }}
        AZ_ROUTER_PASS: ${{ secrets.AZ_ROUTER_PASS }}